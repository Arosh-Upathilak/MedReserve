<div style='font-family: Arial, sans-serif; background-color:#f4f6f8; padding:40px;'>
    <div style='max-width:500px; margin:auto; background:white; padding:30px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1); text-align:center;'>

        <h2 style='color:#2c3e50; margin-bottom:20px;'>Password Reset</h2>

        <p style='color:#555; font-size:14px;'>
            We received a request to reset your password.
        </p>

        <p style='color:#555; font-size:14px; margin-bottom:25px;'>
            Click the button below to reset your password.
        </p>

        <a href='{{resetUrl}}' 
           style='display:inline-block;
                  padding:12px 25px;
                  background-color:#007bff;
                  color:white;
                  text-decoration:none;
                  border-radius:6px;
                  font-weight:bold;
                  font-size:14px;'>
            Reset Password
        </a>

        <p style='margin-top:25px; font-size:13px; color:#777;'>
            This link will expire in <strong>1 hour</strong>.
        </p>

        <hr style='margin:25px 0; border:none; border-top:1px solid #eee;'>

        <p style='font-size:12px; color:#999;'>
            If you did not request this password reset, please ignore this email.
        </p>

        <p style='font-size:12px; color:#999; margin-top:10px;'>
            © {{year}}  MedReserve. All rights reserved.
        </p>

    </div>
</div>
